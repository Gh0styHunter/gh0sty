<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gh0sty Security Report - {{TARGET}}</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --panel-bg: #1f2833;
            --text-color: #c5c6c7;
            --text-title: #ffffff;
            --primary: #66fcf1;
            --primary-dark: #45a29e;
            --danger: #ff3b30;
            --success: #00ff66;
            --warning: #ffcc00;
            --border-radius: 8px;
            --transition-speed: 0.3s;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            border-bottom: 2px solid var(--primary-dark);
            padding-bottom: 20px;
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .header-left h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .header-left p {
            margin: 0;
            color: var(--text-title);
            font-size: 1.1rem;
        }

        .header-right {
            text-align: right;
        }

        .header-right span {
            display: block;
            font-size: 0.9rem;
            color: #888;
        }

        .panel {
            background-color: var(--panel-bg);
            border-radius: var(--border-radius);
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(102, 252, 241, 0.15);
            transition: transform var(--transition-speed), border-color var(--transition-speed);
        }

        .panel:hover {
            transform: translateY(-3px);
            border-color: rgba(102, 252, 241, 0.4);
        }

        .panel-title {
            color: var(--primary);
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary);
            padding-left: 15px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background-color: rgba(11, 12, 16, 0.6);
            border-radius: var(--border-radius);
            overflow: hidden;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        th {
            background-color: rgba(102, 252, 241, 0.1);
            color: var(--primary);
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        tr:hover {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .badge-success {
            background-color: rgba(0, 255, 102, 0.15);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .badge-danger {
            background-color: rgba(255, 59, 48, 0.15);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .badge-warning {
            background-color: rgba(255, 204, 0, 0.15);
            color: var(--warning);
            border: 1px solid var(--warning);
        }

        .badge-info {
            background-color: rgba(102, 252, 241, 0.15);
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .summary-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 10px 0;
        }

        .summary-card:last-child {
            border-bottom: none;
        }

        .summary-label {
            font-weight: bold;
            color: var(--text-title);
        }

        footer {
            text-align: center;
            padding: 30px 0;
            color: #555;
            font-size: 0.9rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 60px;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            .header-right {
                text-align: left;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1>gh0sty Framework v1.0</h1>
                <p>Security Audit Report: <strong>{{TARGET}}</strong></p>
            </div>
            <div class="header-right">
                <span><strong>Module:</strong> {{MODULE}}</span>
                <span><strong>Generated:</strong> {{TIMESTAMP}}</span>
            </div>
        </header>

        <main>
            {{CONTENT}}
        </main>

        <footer>
            Generated automatically by gh0sty Framework. Author: Jackson F Bertoldo. For authorized auditing only.
        </footer>
    </div>
</body>
</html>
